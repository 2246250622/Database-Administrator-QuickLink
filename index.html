<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登入 - DBA 書籤系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="IMG_3755.jpg">
    
    <style>
        body { background-color: #f8f9fa; }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .btn-custom {
            background-color: #D0A2F7;
            border-color: #D0A2F7;
            color: white;
        }
        .btn-custom:hover {
            background-color: #C08AE0;
            border-color: #C08AE0;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h3 class="text-center mb-4">DBA 書籤系統</h3>
    <p class="text-center text-muted mb-4">請輸入帳號與密碼登入</p>
    
    <form id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label">帳號</label>
            <input type="text" class="form-control" id="username" placeholder="請輸入帳號" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">密碼</label>
            <input type="password" class="form-control" id="password" placeholder="請輸入密碼" required>
        </div>
        <button type="submit" class="btn btn-custom w-100">登入</button>
    </form>

    <p class="text-center mt-3 text-danger" id="errorMsg" style="display:none;">帳號或密碼錯誤</p>
</div>

<script>
    // 這裡設定正確的帳號密碼（可改成你想要的）
    const VALID_USERNAME = "dbauser";      // ← 改成你想要的帳號
    const VALID_PASSWORD = "gcis2025!";    // ← 改成你想要的密碼（至少改一下！）

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');

        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
            // 登入成功 → 跳轉到主頁面
            localStorage.setItem('isLoggedIn', 'true');  // 記住已登入（可選）
            window.location.href = 'home.html';           // 改成你的主頁面檔名
        } else {
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
        }
    });

    // 如果已經登入過，直接跳轉（可選功能）
    if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = 'home.html';
    }
</script>

</body>
</html>
