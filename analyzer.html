<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <title>DBA AI Analyzer - Upload Version</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
        :root { --custom-purple: #D0A2F7; }
        .header-bg { background-color: var(--custom-purple); }
        #analysisContent {
            background: #212529; color: #00ff41; padding: 15px;
            border-radius: 8px; font-family: monospace; white-space: pre-wrap;
        }
        .upload-box {
            border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 10px;
            background: #fdfdfd; transition: 0.3s;
        }
        .upload-box:hover { border-color: var(--custom-purple); background: #f8f0ff; }
    </style>
</head>
<body>

<header class="p-3 mb-4 border-bottom header-bg">
    <div class="container d-flex align-items-center">
        <b>Database Administrator</b>
        <span class="ms-3">🤖 AI Analyzer (Self-Service)</span>
    </div>
</header>

<div class="container">
    <div class="card p-4 shadow-sm border-0 mb-5">
        <h2 class="mb-4">🤖 MariaDB Log AI Analyzer</h2>
        
        <div class="row g-4">
            <div class="col-lg-5">
                <label class="form-label fw-bold">1. 上傳 Log 檔案 (可多選)</label>
                <div class="upload-box" id="dropZone">
                    <input type="file" id="logFiles" class="form-control mb-2" multiple accept=".log,.txt">
                    <small class="text-muted">支援 .log, .txt (會自動讀取末尾內容)</small>
                </div>
                <div id="fileList" class="mt-2 small text-primary"></div>
                
                <button id="startAnalyze" class="btn btn-primary btn-lg w-100 mt-4 shadow-sm">🚀 執行深度診斷</button>
            </div>

            <div class="col-lg-7">
                <label class="form-label fw-bold">2. 貼入 INC 資訊 (Incident Message)</label>
                <textarea id="incText" class="form-control" rows="8" placeholder="貼上 Incident 內容..."></textarea>
            </div>
        </div>

        <hr class="my-4">

        <div id="resultArea" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h4 class="mb-0">📊 DBA 分析報告</h4>
                <button class="btn btn-sm btn-outline-secondary" onclick="copyResult()">📋 複製結果</button>
            </div>
            <pre id="analysisContent">正在分析中...</pre>
        </div>
    </div>
</div>

<script>
    const API_KEY = "sk-31484e39ef50408ba687476fbd830c6c"; // 注意：純 HTML 會暴露 Key
    const MAX_TAIL_CHARS = 8000;

    // 顯示已選取的檔案名
    document.getElementById('logFiles').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        document.getElementById('fileList').innerText = files.length > 0 ? `已選取: ${files.map(f => f.name).join(', ')}` : "";
    });

    async function readFileTail(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const tail = content.length > MAX_TAIL_CHARS ? content.slice(-MAX_TAIL_CHARS) : content;
                resolve(`\n=== FILE: ${file.name} ===\n${tail}\n`);
            };
            reader.readAsText(file);
        });
    }

    document.getElementById('startAnalyze').addEventListener('click', async () => {
        const files = document.getElementById('logFiles').files;
        const incText = document.getElementById('incText').value;
        const resultArea = document.getElementById('resultArea');
        const content = document.getElementById('analysisContent');

        if (files.length === 0 || !incText) return alert("請上傳 Log 檔案並貼入 INC 資訊！");

        resultArea.classList.remove('d-none');
        content.innerText = "⏳ 正在讀取檔案並請求 AI 分析...";
        document.getElementById('startAnalyze').disabled = true;

        try {
            // 1. 讀取所有檔案內容
            let allLogData = "";
            for (let file of files) {
                allLogData += await readFileTail(file);
            }

            // 2. 呼叫 DeepSeek API
            const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: 
                            "You are a senior MySQL/MariaDB DBA with over 12 years of experience, specializing in the DBaaS platform for the Hong Kong Government Cloud Infrastructure Services (GCIS).You currently manage over 1,000 virtual machines, including:- Testing environment: T1 / T2 site- Production environment: P1 / P2 site (P1 is typically the primary production site; p1vmgt-stage01 is the preferred jump host)Your primary responsibilities include:- Deployment, monitoring, troubleshooting, and high-availability management of MariaDB Galera Cluster (Active-Active)- HAProxy configuration and troubleshooting (multiple HAProxy clusters used for front-end load balancing and VIP management)- Maintenance of Galera Arbitrator/Witness nodes (located at SKDC and WCDC)- Using and troubleshooting peripheral tools such as Percona Monitoring and Management (PMM), Binlog server, WriteTest server, and LogCopy server- Daily monitoring, performance tuning, backup and restore, version upgrades, and capacity planning- Handling various DBA requests in development, testing, and production environments (database creation, permissions, slow queries, deadlocks, split-brain, etc.)Key Environment Information (Please memorize these mappings and do not mix them up):Jumphost / Bastion:- Testing stage machine: t1vmgt-stage01- Production stage machines (priority order): p1vmgt-stage01 → p2vmgt-stage01Primary Monitoring and Management Nodes (Production):- PMM server: p1vdbs-gcissc-pmm01 (P1), p2vdbs-gcissc-pmm01 (P2)- Binlog server: p1vdbs-gcissc-binlog01 (P1), p2vdbs-gcissc-binlog01 (P2)- PowerDNS: p1vmgt-pwrdns01/02 (P1), p2vmgt-pwrdns01/02 (P2)HAProxy Groups (Group 1–8):- Group 1: haproxy01d/e/f (P1 & P2)- Group 2: haproxy02d/e/f- Group 3: haproxy03d/e/f- Group 4: haproxy04d/e/f- Group 5: haproxy05d/e/f- Group 6: haproxy06d/e/f- Group 7: haproxy07d/e/f- Group 8: haproxy08d/e/fEach group typically consists of 3 HAProxy instances (d/e/f), located in different failure domains.Witness / Arbitrator:- SKDC: w1vdbs-gcissc-witness0Xd (X=1–8)- WCDC: p2vdbs-gcissc-witness0XdBasic Naming Conventions for DBaaS Services:- VMName format is typically {site}vdbs-{gcisid}-{servicename}-{node}-{seq}- DNS naming: {site}vdbs-{gcisid}-{servicename}-ha[1|2|rpt].dbaas.gcis.hksarg- Most use MariaDB (Galera); a few special cases may useTranslated with DeepL.com (free version)I have uploaded mariadb-error.log, chk_mariadb_cluster_*.log, cpu_status_history.txt and list_mariadb_session_*.log.=== INC INFORMATION ==={inc_text}Analyze all files carefully and output strictly in the following format.Be concise, factual and direct like an on-call DBA handover note. Do not add extra headings or polite words.{inc_text}Message: [full error message from INC]-------1. Time：[Timeline of events leading to the issue, based on log timestamps]-------2. [CPU status during the issue, based on cpu_status_history.txt, if it is normal just say 'CPU status were normal during the issue']3. [Root cause based on actual logs at log snapshots during the surrounding period]-------4. [First key observation about the WriteTest timeout at log snapshots during the surrounding period]5. [Critical SQL Discovery: You MUST perform a exhaustive, line-by-line inspection of every single snapshot in list_mariadb_session_*.log within +/- 10 minutes of the INC time.    - Specifically, locate the section 'get non-sleep session details (limit 100)'.   - You MUST NOT ignore any row unless the 'User' is 'system user', 'root', or 'gcis_pmm'.   - If a row contains 'CREATE', 'ALTER', 'DROP', 'REPLACE', or any application-level DML (e.g., INSERT/UPDATE/SELECT from non-system schemas), you MUST capture it.   - Provide the EXACT [OK] timestamp and the FULL SQL text.    - If multiple snapshots show the same long-running SQL, mention its duration across snapshots.   - If absolutely no application SQL exists after checking every snapshot, state 'No active SQL captured in session log snapshots during the surrounding period'.]6. [What happened in the cluster or resources at that time at log snapshots during the surrounding period]7. [Any other important finding at log snapshots during the surrounding period]-------Current cluster status: [one short and accurate sentence about current cluster state]"
                             },
                        { role: "user", content: `INC INFORMATION:\n${incText}\n\nLOG DATA:\n${allLogData}` }
                    ]
                })
            });

            const data = await response.json();
            content.innerText = data.choices[0].message.content;
        } catch (e) {
            content.innerText = "❌ 錯誤：" + e.message;
        } finally {
            document.getElementById('startAnalyze').disabled = false;
        }
    });

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('analysisContent').innerText).then(() => alert("已複製！"));
    }
</script>

</body>
</html>
