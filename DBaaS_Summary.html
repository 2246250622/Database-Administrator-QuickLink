<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCIS DBaaS Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="icon" type="image/x-icon" href="IMG_3755.jpg">

    <style>
        body { 
            font-family: "Segoe UI", Arial, sans-serif; 
            background: #121212; 
            color: #eee; 
        }
        .navbar-custom { background-color: #D0A2F7 !important; }
        .upload-box { 
            text-align: center; 
            padding: 25px; 
            background: #252525; 
            border: 2px dashed #666; 
            border-radius: 10px; 
            margin: 20px auto;
            max-width: 500px;
        }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 12px; text-align: center; }
        th { background: #006600; color: white; }
        .subheader { background: #004d00; color: #aaffaa; }
        .total-row { background: #003366; font-weight: bold; color: #ffff99; }
        .positive { color: #00ff00; font-weight: bold; }
        .date { text-align: right; color: #888; margin-top: 15px; font-size: 0.95em; }
    </style>
</head>
<body>

<!-- ==================== 你的 Navbar ==================== -->
<header class="p-3 mb-3 border-bottom navbar-custom">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 link-body-emphasis text-decoration-none">
                <strong>Database Administrator</strong>
            </a>

            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="index.html" class="nav-link px-2 link-body-emphasis">Home</a></li>
            </ul>

            <div class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3">
                <button type="button" class="btn btn-outline-custom" onclick='window.open("https://mail.21cn.net/", "_blank")'>Webmail</button>
                <button type="button" class="btn btn-outline-custom" data-bs-toggle="modal" data-bs-target="#staticBackdrop">Server List ⛏️</button>
                <button type="button" class="btn btn-outline-custom" onclick='location.href="dbaas_list.html"'>Summary</button>
                <button type="button" class="btn btn-outline-custom active" onclick='location.href="DBaaS_Summary.html"'>GCIS DBaaS Summary</button>
                <button type="button" class="btn btn-outline-custom" onclick='location.href="filter.html"'>T0P0 Filter</button>
                <button type="button" class="btn btn-outline-custom" onclick='location.href="Converter.html"'>Unit Converter ⚡</button>
            </div>

            <div class="dropdown text-end">
                <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                    <img src="IMG_3755.jpg" alt="mdo" width="32" height="32" class="rounded-circle">
                </a>
                <ul class="dropdown-menu text-small">
                    <li><a class="dropdown-item" href="#" onclick="logout()">Sign out</a></li>
                </ul>
            </div>
        </div>
    </div>
</header>

<!-- ==================== Server List Modal ==================== -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Server List ⛏️</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <a href="dbaas_list.html" class="list-group-item list-group-item-action list-group-item-danger" target="_blank">DBaaS Summary</a>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== DBaaS Summary 主體 ==================== -->
<div class="container mt-4">
    <h1 class="text-center">10. DBaaS Summary</h1>
    
    <div class="upload-box">
        <input type="file" id="fileInput" accept=".xls,.xlsx" class="form-control" style="max-width: 420px; margin: 0 auto;">
    </div>

    <div id="result"></div>
    <div class="date">Report Date: <span id="dateText">--</span></div>
</div>

<script>
// ==================== Session Lock ====================
if (localStorage.getItem('isLoggedIn') !== 'true') {
    alert('Please log in first!');
    window.location.href = 'index.html';
}

function logout() {
    localStorage.removeItem('isLoggedIn');
    window.location.href = 'index.html';
}

// ==================== DBaaS Summary 核心邏輯 ====================
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

            const aaGCIS = new Set();
            const apGCIS = new Set();

            const aaTestVM = new Set();
            const aaProdVM = new Set();
            const apTestVM = new Set();
            const apProdVM = new Set();

            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || r.length < 10) continue;

                const gcisID = String(r[0] || "").trim();
                if (!gcisID || gcisID === "GCISID") continue;

                const site = String(r[2] || "").trim().toUpperCase();
                const dbaasType = String(r[8] || "").trim().toLowerCase();
                const dbType = String(r[9] || "").trim();

                if (!dbType.includes("MariaDB")) continue;

                const isTesting = (site === "T1" || site === "T2");
                const isProduction = (site === "P1" || site === "P2");

                if (dbaasType.includes("active-active") || dbaasType.includes("active active")) {
                    aaGCIS.add(gcisID);
                    if (isTesting) aaTestVM.add(gcisID);
                    if (isProduction) aaProdVM.add(gcisID);
                } else {
                    apGCIS.add(gcisID);
                    if (isTesting) apTestVM.add(gcisID);
                    if (isProduction) apProdVM.add(gcisID);
                }
            }

            const html = `
                <table class="table table-dark table-bordered">
                    <thead>
                        <tr>
                            <th colspan="2" rowspan="2">DBaaS Summary as of 11-Mar-2026</th>
                            <th colspan="2">GCIS ID Count (Unique)</th>
                            <th colspan="3">DB Count (Unique per Site Group)</th>
                            <th rowspan="2">+ diff DB Count from last</th>
                        </tr>
                        <tr>
                            <th class="subheader">Testing</th>
                            <th class="subheader">Production</th>
                            <th class="subheader">Testing</th>
                            <th class="subheader">Production</th>
                            <th class="subheader">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="font-weight:bold;">Active-Active</td>
                            <td>MariaDB</td>
                            <td>${aaGCIS.size}</td>
                            <td>${aaGCIS.size}</td>
                            <td>${aaTestVM.size}</td>
                            <td>${aaProdVM.size}</td>
                            <td>${aaTestVM.size + aaProdVM.size}</td>
                            <td class="positive">+1</td>
                        </tr>
                        <tr>
                            <td style="font-weight:bold;">Active-Passive</td>
                            <td>MariaDB</td>
                            <td>${apGCIS.size}</td>
                            <td>${apGCIS.size}</td>
                            <td>${apTestVM.size}</td>
                            <td>${apProdVM.size}</td>
                            <td>${apTestVM.size + apProdVM.size}</td>
                            <td class="positive">0</td>
                        </tr>
                        <tr class="total-row">
                            <td colspan="2">Total</td>
                            <td>${aaGCIS.size + apGCIS.size}</td>
                            <td>${aaGCIS.size + apGCIS.size}</td>
                            <td>${aaTestVM.size + apTestVM.size}</td>
                            <td>${aaProdVM.size + apProdVM.size}</td>
                            <td>${aaTestVM.size + aaProdVM.size + apTestVM.size + apProdVM.size}</td>
                            <td class="positive">+1</td>
                        </tr>
                    </tbody>
                </table>
            `;

            document.getElementById('result').innerHTML = html;
            document.getElementById('dateText').textContent = new Date().toLocaleString('zh-HK');

        } catch (err) {
            document.getElementById('result').innerHTML = `<p style="color:red; text-align:center;">解析失敗：${err.message}</p>`;
        }
    };
    reader.readAsArrayBuffer(file);
});
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
