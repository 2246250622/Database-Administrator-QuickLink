<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>GCIS DBaaS Summary - Fixed Rows & Deduplication</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background: #828282; color: #ffffff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00ccff; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; background: #424242; border: 1px solid #444; margin-top: 20px; }
        th, td { border: 1px solid #ffffff; padding: 12px; text-align: center; }
        th { background: #006600; color: rgb(2, 2, 2); }
        .subheader { background: #004d00; color: #afffaf; font-size: 0.9em; }
        .total-row { background: #003366; font-weight: bold; color: #ffff99; }
        .positive { color: #00ff00; font-weight: bold; }
        .date { text-align: right; color: #888; margin-top: 10px; font-size: 0.9em; }
        .upload-box { text-align: center; padding: 20px; background: #868686; border-radius: 8px; border: 1px dashed #555; }
        input[type="file"] { background: #333; color: #00ffcc; padding: 10px; border: 1px solid #555; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>10. DBaaS Summary</h1>
        <div class="upload-box">
            <input type="file" id="fileInput" accept=".xls,.xlsx" />
        </div>
        <div id="result"></div>
        <div class="date">Report Date: <span id="dateText">--</span></div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

                // --- 數據結構初始化 ---
                const summary = {
                    aa: { idsT: new Set(), idsP: new Set(), dbT: 0, dbP: 0 },
                    ap: { idsT: new Set(), idsP: new Set(), dbT: 0, dbP: 0 }
                };
                const globalIdsT = new Set();
                const globalIdsP = new Set();

                // 從第二行開始遍歷 (i=1)
                for (let i = 1; i < rows.length; i++) {
                    const r = rows[i];
                    if (!r || r.length < 10) continue;

                    const gcisID = String(r[0] || "").trim();
                    if (!gcisID || gcisID.toUpperCase() === "GCISID") continue;

                    const site = String(r[2] || "").trim().toUpperCase();
                    const dbaasType = String(r[8] || "").toLowerCase();
                    const dbType = String(r[9] || "").trim();

                    // 只處理 MariaDB
                    if (!dbType.includes("MariaDB")) continue;

                    const isTest = (site.startsWith("T")); // T1, T2...
                    const isProd = (site.startsWith("P")); // P1, P2...

                    // 判斷架構：嚴格匹配 Active-Active，其餘歸類為 Active-Passive
                    const isAA = dbaasType.includes("active-active") || dbaasType.includes("active active");

                    if (isAA) {
                        if (isTest) { summary.aa.idsT.add(gcisID); summary.aa.dbT++; globalIdsT.add(gcisID); }
                        if (isProd) { summary.aa.idsP.add(gcisID); summary.aa.dbP++; globalIdsP.add(gcisID); }
                    } else {
                        // 修正：包含所有非 AA 的 MariaDB 實例 (Active-Passive / Standalone)
                        if (isTest) { summary.ap.idsT.add(gcisID); summary.ap.dbT++; globalIdsT.add(gcisID); }
                        if (isProd) { summary.ap.idsP.add(gcisID); summary.ap.dbP++; globalIdsP.add(gcisID); }
                    }
                }

                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th colspan="2" rowspan="2">DBaaS Summary as of 11-Mar-2026</th>
                                <th colspan="2">GCIS ID Count (Unique)</th>
                                <th colspan="3">DB Count (Instances)</th>
                                <th rowspan="2">+ diff DB Count from last</th>
                            </tr>
                            <tr>
                                <th class="subheader">Testing</th>
                                <th class="subheader">Production</th>
                                <th class="subheader">Testing</th>
                                <th class="subheader">Production</th>
                                <th class="subheader">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td rowspan="1" style="font-weight:bold; background:#1a1a1a;">Active-Active</td>
                                <td>MariaDB</td>
                                <td>${summary.aa.idsT.size}</td>
                                <td>${summary.aa.idsP.size}</td>
                                <td>${summary.aa.dbT/2}</td>
                                <td>${summary.aa.dbP/2}</td>
                                <td>${(summary.aa.dbT + summary.aa.dbP)/2}</td>
                                <td class="positive">+1</td>
                            </tr>
                            <tr>
                                <td rowspan="1" style="font-weight:bold; background:#1a1a1a;">Active-Passive</td>
                                <td>MariaDB</td>
                                <td>${summary.ap.idsT.size}</td>
                                <td>${summary.ap.idsP.size}</td>
                                <td>${summary.ap.dbT}</td>
                                <td>${summary.ap.dbP}</td>
                                <td>${summary.ap.dbT + summary.ap.dbP}</td>
                                <td class="positive">0</td>
                            </tr>
                            <tr class="total-row">
                                <td colspan="2">Total (Global Unique ID)</td>
                                <td>${globalIdsT.size}</td>
                                <td>${globalIdsP.size}</td>
                                <td>${summary.aa.dbT/2 + summary.ap.dbT}</td>
                                <td>${summary.aa.dbP/2 + summary.ap.dbP}</td>
                                <td>${(summary.aa.dbT + summary.aa.dbP)/2 + summary.ap.dbT + summary.ap.dbP}</td>
                                <td class="positive">+1</td>
                            </tr>
                        </tbody>
                    </table>
                `;

                document.getElementById('result').innerHTML = html;
                document.getElementById('dateText').textContent = new Date().toLocaleString('zh-HK');
            };
            reader.readAsArrayBuffer(file);
        });
    </script>

    

    <script>
      // Get all the rows in the table
  const rows = document.querySelectorAll('td');
  
  // Add a click event listener to each row
  rows.forEach(row => {
    row.addEventListener('click', () => {
      // Change the background color of the row to green
      row.style.backgroundColor = 'LightGreen';
    });
  });
  
  // Add a click event listener to each row
  rows.forEach(row => {
    row.addEventListener('click', () => {
      // Add a class to the row to indicate that it has been clicked
      row.classList.add('clicked');
    });
  });
  
  </script>
