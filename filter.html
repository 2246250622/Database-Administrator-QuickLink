<div class="filter-container">
    <h3 class="text-center mb-4">Filter Database List</h3>
    <p class="text-center text-muted mb-4">貼上主機清單 → 只保留完整成對的主機（p1/p2 或 t1/t2 都要有）</p>

    <div class="mb-4">
        <label class="form-label fw-bold">主機清單（支援空格、換行、逗號）</label>
        <textarea id="inputData" class="form-control" rows="10" placeholder="p1vdbs-bdacas-pdb1-1-01 p2vdbs-bdacas-pdb1-2-01 ..."></textarea>
    </div>

    <div class="text-center mb-4">
        <button id="filterBtn" class="btn btn-outline-custom px-5 py-2">開始過濾</button>
    </div>

    <div id="resultArea" style="display:none;">
        <div class="mb-4">
            <h5 class="section-title">保留的完整 pair（共 <span id="keptCount">0</span> 對）</h5>
            <pre id="keptPairs"></pre>
            <button id="copyKept" class="btn btn-outline-custom mt-2">📋 複製保留的（每行一個）</button>
        </div>

        <div class="mb-4">
            <h5 class="section-title text-danger">被排除的項目（共 <span id="excludedCount">0</span> 個）</h5>
            <pre id="excludedItems"></pre>
        </div>

        <button id="copyAll" class="btn btn-outline-custom">複製全部結果（保留＋排除）</button>
    </div>
</div>

<script>
    const filterBtn       = document.getElementById('filterBtn');
    const inputData       = document.getElementById('inputData');
    const resultArea      = document.getElementById('resultArea');
    const keptPairsEl     = document.getElementById('keptPairs');
    const excludedItemsEl = document.getElementById('excludedItems');
    const keptCountEl     = document.getElementById('keptCount');
    const excludedCountEl = document.getElementById('excludedCount');
    const copyKept        = document.getElementById('copyKept');
    const copyAll         = document.getElementById('copyAll');

    let lastKeptText = '';
    let lastAllText  = '';

    function getPairKey(host) {
        const match = host.match(/^([pt][12])vdbs-(.+)-([12])-\d{2}$/i);
        if (!match) return null;
        return `${match[1][0].toLowerCase()}_${match[2]}`;
    }

    function getPairSide(host) {
        const match = host.match(/-([12])-\d{2}$/i);
        return match ? match[1] : null;
    }

    filterBtn.addEventListener('click', () => {
        const text = inputData.value.trim();
        if (!text) {
            alert('請先輸入主機名稱清單');
            return;
        }

        const hosts = text.replace(/[\n,，;]+/g, ' ').split(/\s+/).map(s => s.trim()).filter(Boolean);

        const groups = new Map();
        const excluded = [];

        hosts.forEach(host => {
            const key = getPairKey(host);
            const side = getPairSide(host);
            if (key && side) {
                if (!groups.has(key)) groups.set(key, {});
                groups.get(key)[side] = host;
            } else {
                excluded.push({host, reason: '格式不符合 p/t + 1/2-XX 規則'});
            }
        });

        const kept = [];

        groups.forEach((sides, key) => {
            if (sides['1'] && sides['2']) {
                const pair = [sides['1'], sides['2']].sort((a,b) => a.localeCompare(b));
                kept.push(pair);
            } else {
                if (sides['1']) excluded.push({host: sides['1'], reason: '缺少對應的 p2/t2'});
                if (sides['2']) excluded.push({host: sides['2'], reason: '缺少對應的 p1/t1'});
            }
        });

        kept.sort((a,b) => {
            const pa = a[0].startsWith('p') ? -1 : 1;
            const pb = b[0].startsWith('p') ? -1 : 1;
            if (pa !== pb) return pa - pb;
            return a[0].localeCompare(b[0]);
        });

        keptPairsEl.textContent = kept.length > 0 
            ? kept.map(pair => `${pair[0].padEnd(50)}${pair[1]}`).join('\n')
            : '(沒有找到完整的 pair)';
        keptCountEl.textContent = kept.length;

        excludedItemsEl.textContent = excluded.length > 0 
            ? excluded.map(item => `${item.host.padEnd(50)}${item.reason}`).join('\n')
            : '(沒有被排除的項目)';
        excludedCountEl.textContent = excluded.length;

        lastKeptText = kept.flat().join('\n');
        lastAllText  = `保留的主機（每行一個）:\n${lastKeptText || '(無)'}\n\n排除的 (${excluded.length} 個):\n${excluded.map(e => `${e.host}  ${e.reason}`).join('\n') || '(無)'}`;

        resultArea.style.display = 'block';
    });

    copyKept.addEventListener('click', async () => {
        if (lastKeptText) {
            await navigator.clipboard.writeText(lastKeptText);
            copyKept.textContent = '已複製 ✓';
            setTimeout(() => copyKept.textContent = '📋 複製保留的（每行一個）', 1800);
        }
    });

    copyAll.addEventListener('click', async () => {
        if (lastAllText) {
            await navigator.clipboard.writeText(lastAllText);
            copyAll.textContent = '已複製 ✓';
            setTimeout(() => copyAll.textContent = '複製全部結果', 1800);
        }
    });

    function logout() {
        localStorage.removeItem('isLoggedIn');
        window.location.href = 'index.html';
    }
</script>
